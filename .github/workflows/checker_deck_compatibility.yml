name: "1.1.1 Checker: Steam Deck compatibility"

on:
  workflow_run:
    workflows: ["1.1 Promocje enrichment"]
    types:
      - completed

jobs:
  check:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Sprawdź Steam Deck compatibility"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID_PROMOCJE: ${{ secrets.SHEET_ID_PROMOCJE }}
          SHEET_ID_WISHLIST: ${{ secrets.SHEET_ID_WISHLIST }}
        run: python steam_promocje_deck_check.py
